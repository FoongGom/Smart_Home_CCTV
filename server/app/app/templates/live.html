<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 영상 - LNN 보안</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nanum Gothic', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); 
            color: #1e2937; 
            padding: 25px; 
        }
        nav {
            background: #1e40af;
            padding: 16px 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        nav a:hover { 
            color: #bae6fd; 
            transform: translateY(-3px);
        }
        .live-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        .live-header {
            color: #1e40af;
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        img { 
            max-width: 100%; 
            border-radius: 16px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/"><i class="fas fa-home"></i> 대시보드</a>
        <a href="/live"><i class="fas fa-video"></i> 실시간 영상</a>
        <a href="/events"><i class="fas fa-list"></i> 이벤트 로그</a>
    </nav>

    <div class="live-container">
        <div class="live-header">
            <i class="fas fa-circle" style="color:#22c55e"></i> 실시간 모니터링
        </div>
        <img src="/live.jpg" id="live-stream" alt="실시간 영상">
    </div>

    <script>
        setInterval(() => {
            document.getElementById('live-stream').src = '/live.jpg?' + new Date().getTime();
        }, 100);
    </script>
</body>
</html>
